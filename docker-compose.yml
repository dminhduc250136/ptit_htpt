services:
  api-gateway:
    build: ./sources/backend/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - inventory-service
      - notification-service

  user-service:
    build: ./sources/backend/user-service
    ports:
      - "8081:8080"

  product-service:
    build: ./sources/backend/product-service
    ports:
      - "8082:8080"

  order-service:
    build: ./sources/backend/order-service
    ports:
      - "8083:8080"

  payment-service:
    build: ./sources/backend/payment-service
    ports:
      - "8084:8080"

  inventory-service:
    build: ./sources/backend/inventory-service
    ports:
      - "8085:8080"

  notification-service:
    build: ./sources/backend/notification-service
    ports:
      - "8086:8080"
