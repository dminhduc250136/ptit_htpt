spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        # user-service auth: /api/users/auth → /auth (must come before /api/users/**)
        - id: user-service-auth-base
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/auth
          filters:
            - RewritePath=/api/users/auth, /auth
        - id: user-service-auth
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/auth/**
          filters:
            - RewritePath=/api/users/auth/(?<seg>.*), /auth/${seg}

        # user-service admin: /api/users/admin → /admin/users
        - id: user-service-admin-base
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/admin
          filters:
            - RewritePath=/api/users/admin, /admin/users
        - id: user-service-admin
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/admin/**
          filters:
            - RewritePath=/api/users/admin/(?<seg>.*), /admin/users/${seg}

        # user-service me: /api/users/me/** → /users/me/** (PHẢI đứng TRƯỚC user-service-base
        # để /api/users/me/password KHÔNG match catch-all /api/users/{id} với id="me/password".
        # Phase 10 sẽ extend với GET/PATCH /api/users/me cho profile editing.)
        - id: user-service-me-base
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/me
          filters:
            - RewritePath=/api/users/me, /users/me
        - id: user-service-me
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/me/**
          filters:
            - RewritePath=/api/users/me/(?<seg>.*), /users/me/${seg}

        # user-service: /api/users -> /users, /api/users/{id} -> /users/{id}
        - id: user-service-base
          uri: http://user-service:8080
          predicates:
            - Path=/api/users
          filters:
            - RewritePath=/api/users, /users
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<seg>.*), /users/${seg}

        # product-service admin: /api/products/admin → /admin/products
        - id: product-service-admin-base
          uri: http://product-service:8080
          predicates:
            - Path=/api/products/admin
          filters:
            - RewritePath=/api/products/admin, /admin/products
        - id: product-service-admin
          uri: http://product-service:8080
          predicates:
            - Path=/api/products/admin/**
          filters:
            - RewritePath=/api/products/admin/(?<seg>.*), /admin/products/${seg}

        # product-service: /api/products -> /products, /api/products/{id} -> /products/{id}
        - id: product-service-base
          uri: http://product-service:8080
          predicates:
            - Path=/api/products
          filters:
            - RewritePath=/api/products, /products
        - id: product-service
          uri: http://product-service:8080
          predicates:
            - Path=/api/products/**
          filters:
            - RewritePath=/api/products/(?<seg>.*), /products/${seg}

        # order-service admin: /api/orders/admin → /admin/orders
        - id: order-service-admin-base
          uri: http://order-service:8080
          predicates:
            - Path=/api/orders/admin
          filters:
            - RewritePath=/api/orders/admin, /admin/orders
        - id: order-service-admin
          uri: http://order-service:8080
          predicates:
            - Path=/api/orders/admin/**
          filters:
            - RewritePath=/api/orders/admin/(?<seg>.*), /admin/orders/${seg}

        # order-service
        - id: order-service-base
          uri: http://order-service:8080
          predicates:
            - Path=/api/orders
          filters:
            - RewritePath=/api/orders, /orders
        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<seg>.*), /orders/${seg}

        # payment-service
        - id: payment-service-base
          uri: http://payment-service:8080
          predicates:
            - Path=/api/payments
          filters:
            - RewritePath=/api/payments, /payments
        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/payments/(?<seg>.*), /payments/${seg}

        # inventory-service
        - id: inventory-service-base
          uri: http://inventory-service:8080
          predicates:
            - Path=/api/inventory
          filters:
            - RewritePath=/api/inventory, /inventory
        - id: inventory-service
          uri: http://inventory-service:8080
          predicates:
            - Path=/api/inventory/**
          filters:
            - RewritePath=/api/inventory/(?<seg>.*), /inventory/${seg}

        # notification-service
        - id: notification-service-base
          uri: http://notification-service:8080
          predicates:
            - Path=/api/notifications
          filters:
            - RewritePath=/api/notifications, /notifications
        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<seg>.*), /notifications/${seg}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: users
        url: /api/users/v3/api-docs
      - name: products
        url: /api/products/v3/api-docs
      - name: orders
        url: /api/orders/v3/api-docs
      - name: payments
        url: /api/payments/v3/api-docs
      - name: inventory
        url: /api/inventory/v3/api-docs
      - name: notifications
        url: /api/notifications/v3/api-docs
