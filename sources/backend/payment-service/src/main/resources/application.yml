spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tmdt}?currentSchema=payment_svc
    username: ${DB_USER:tmdt}
    password: ${DB_PASSWORD:tmdt}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment_svc
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    schemas: payment_svc
    default-schema: payment_svc
    baseline-on-migrate: false
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration
