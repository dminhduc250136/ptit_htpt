spring:
  application:
    name: user-service
server:
  port: 8084
management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  profiles: dev
  datasource:
    url: jdbc:mysql://localhost:3306/user_db
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
jwt:
  secret: your_jwt_secret
  expiration: 3600
cors:
  allowed-origins: http://localhost:3000
